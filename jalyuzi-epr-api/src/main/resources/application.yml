spring:
  application:
    name: jalyuzi-epr-api

  profiles:
    active: dev

  # Multipart fayl yuklash chegaralari (rasm uploadlar uchun)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  # Timezone - Toshkent vaqti
  jackson:
    time-zone: Asia/Tashkent
    date-format: yyyy-MM-dd HH:mm:ss

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Tashkent

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8170
  servlet:
    context-path: /api

# Application-specific file storage
app:
  # Ommaviy frontend manzili — kuzatuv havolalari (/t/{code}) shu asosda quriladi
  public-base-url: ${PUBLIC_BASE_URL:https://kanjaltib.uz}
  # "Jalyuzimni kuzat" — havola yetkazish: asosiy kanal Telegram (bepul).
  # Telegram'siz mijozlarga SMS zaxirasini yoqish uchun true qiling (Eskiz pullik).
  tracking:
    sms-fallback-enabled: ${TRACKING_SMS_FALLBACK:false}
    # "O'lchovdan keyin" — o'lchovdan necha kun o'tgach zaklad eslatmasi yuboriladi
    quote-followup-days: ${QUOTE_FOLLOWUP_DAYS:2}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    public-url-prefix: /api/files
  # Mahsulot atribut qiymatlari validatsiyasi: STRICT yoki LENIENT (migratsiya davri uchun)
  attribute-validation:
    mode: ${ATTRIBUTE_VALIDATION_MODE:LENIENT}

# Online payment providers (Click, Payme)
# Enable rejimi faqat env variable kalitlar mavjudligida ishlaydi
payment:
  click:
    enabled: ${CLICK_ENABLED:false}
    merchant-id: ${CLICK_MERCHANT_ID:}
    service-id: ${CLICK_SERVICE_ID:}
    secret-key: ${CLICK_SECRET_KEY:}
  payme:
    enabled: ${PAYME_ENABLED:false}
    merchant-id: ${PAYME_MERCHANT_ID:}
    key: ${PAYME_KEY:}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:wdWwztil8OZlZmcfS71GC6ANxFUPe1WU4kevOsZB4QM=}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# SMS Configuration (Eskiz.uz)
sms:
  eskiz:
    base-url: https://notify.eskiz.uz/api
    email: ${ESKIZ_EMAIL:}
    password: ${ESKIZ_PASSWORD:}
    enabled: ${SMS_ENABLED:false}
  verification:
    code-length: 6
    expiration-minutes: 5
    max-attempts: 3
    resend-delay-seconds: 60

# Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
    enabled: ${TELEGRAM_BOT_ENABLED:false}
    api-url: https://api.telegram.org
    webhook-url: ${TELEGRAM_WEBHOOK_URL:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}

# Logging
logging:
  level:
    root: INFO
    uz.jalyuziepr: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.security.access: DEBUG
