# www -> root domain redirect
server {
    listen 80;
    server_name www.kanjaltib.uz;
    return 301 $scheme://kanjaltib.uz$request_uri;
}

server {
    listen 80;
    server_name kanjaltib.uz localhost _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip siqish
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static fayllar uchun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API so'rovlarni backend ga proxy qilish
    location /api/ {
        proxy_pass http://jalyuzi-epr-api:8170;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket uchun timeout
        proxy_read_timeout 86400;
    }

    # Service Worker - keshlanmasligi kerak
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # PWA Manifest
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
    }

    # SPA routing - barcha yo'llarni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }
}
