server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker'ning ichki DNS resolver'i.
    # proxy_pass'da variable ishlatilganda nginx startup'da DNS resolve qilmaydi
    # va backend keyinchalik paydo bo'lsa ham ishlay boshlaydi.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Backend upstream (env variable orqali o'zgartirish mumkin)
    set $backend_host "jalyuzi-epr-api";
    set $backend_port "8170";

    # Gzip siqish
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static fayllar uchun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API so'rovlarni backend ga proxy qilish
    location /api/ {
        # Variable orqali resolve qilish — nginx ishga tushganda DNS xatolik bo'lmaydi
        proxy_pass http://$backend_host:$backend_port$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket uchun timeout
        proxy_read_timeout 86400;

        # Backend mavjud bo'lmasa 502 qaytarish (crash o'rniga)
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Service Worker - keshlanmasligi kerak
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # PWA Manifest
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
    }

    # SPA routing - barcha yo'llarni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }
}
